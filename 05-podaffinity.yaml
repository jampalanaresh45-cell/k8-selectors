apiVersion: v1
kind: Pod
metadata:
  name: pod-1
  labels:
    app: pod-1
spec:        
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-2
spec: 
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - pod-1
          topologyKey: topology.kubernetes.io/zone
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - nginx    
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always
  